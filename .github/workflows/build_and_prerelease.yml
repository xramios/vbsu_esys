name: Build and Create Prerelease
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build (skip tests)
        run: mvn -B -DskipTests package

      - name: Get project version
        id: version
        run: |
          VERSION=$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive org.codehaus.mojo:exec-maven-plugin:3.1.0:exec)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Normalize release tag
        id: tag
        run: |
          RAW_VERSION=${{ steps.version.outputs.version }}
          if [[ "$RAW_VERSION" == *"SNAPSHOT" ]]; then
            # replace SNAPSHOT with run number
            TAG_VERSION=${RAW_VERSION/SNAPSHOT/prerelease-${GITHUB_RUN_NUMBER}}
          else
            TAG_VERSION=${RAW_VERSION}-${GITHUB_RUN_NUMBER}
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub prerelease and upload JAR (gh CLI)
        id: create_pr
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "Creating prerelease $TAG"
          export GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          # create release and upload jar
          gh release create "$TAG" target/*.jar --prerelease --title "$TAG" --notes "Automated prerelease from CI (snapshot)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Build and Create Prerelease
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build (skip tests)
        run: mvn -B -DskipTests package

      - name: Create prerelease
        id: create_pr
        uses: softprops/action-gh-release@v1
        with:
          tag_name: prerelease-${{ github.run_number }}
          name: prerelease-${{ github.run_number }}
          body: Automated prerelease from CI (snapshot)
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload jar asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: prerelease-${{ github.run_number }}
          name: prerelease-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-release-asset@v2
        with:
          upload_url: ${{ steps.create_pr.outputs.upload_url }}
          asset_path: target/paul_esys-1.0-SNAPSHOT.jar
          asset_name: paul_esys-1.0-SNAPSHOT.jar
          asset_content_type: application/java-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

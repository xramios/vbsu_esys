name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Xvfb and unzip (for GUI tests and Derby)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb unzip

      - name: Download Apache Derby
        run: |
          set -e
          curl -fSLo derby.zip "https://dlcdn.apache.org//db/derby/db-derby-10.17.1.0/db-derby-10.17.1.0-bin.zip"
          unzip -q derby.zip
          mv db-derby-10.17.1.0-bin derby
          ls -la derby

      - name: Configure and start Derby Network Server
        run: |
          mkdir -p derby/system
          cat > derby/system/derby.properties <<'EOF'
          derby.drda.host=127.0.0.1
          derby.drda.portNumber=1527
          derby.connection.requireAuthentication=false
          EOF
          export DERBY_SYSTEM_HOME=$(pwd)/derby/system
          nohup $(pwd)/derby/bin/startNetworkServer >/tmp/derby_ci.log 2>&1 &
          # wait up to 30s for port 1527
          for i in {1..30}; do ss -ltn | grep -q 1527 && break || sleep 1; done
          ss -ltnp | grep 1527 || true

      - name: Build and run unit tests (headful Swing tests via Xvfb)
        env:
          DERBY_SYSTEM_HOME: ${{ github.workspace }}/derby/system
        run: |
          xvfb-run -a ./mvnw -B -V test

      - name: Package (on success)
        if: success()
        run: |
          ./mvnw -B -V -DskipTests package

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: Projects/vbsu_esys/target/*.jar

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify status
        run: |
          echo "Build status: ${{ needs.build.result }}"
